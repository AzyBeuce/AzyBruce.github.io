<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角星君 · 人格测试</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #e8e0f8 0%, #d4c8f0 40%, #c8bce8 100%);
            min-height: 100vh;
            padding: 20px 16px 40px;
        }

        .container { max-width: 420px; margin: 0 auto; }

        /* ══ 开始页 ══ */
        #startPage { text-align: center; }

        .start-banner {
            background: linear-gradient(135deg, #9b7fe8 0%, #7c5cbf 100%);
            border-radius: 24px;
            padding: 28px 24px 24px;
            margin-bottom: 18px;
            box-shadow: 0 8px 24px rgba(124,92,191,0.35);
            position: relative;
            overflow: hidden;
        }

        .start-banner::before {
            content: '';
            position: absolute;
            top: -20px; right: -20px;
            width: 100px; height: 100px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .banner-title {
            font-size: 36px;
            font-weight: 900;
            color: #fff;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.15);
            letter-spacing: 2px;
            line-height: 1.2;
            margin-bottom: 6px;
        }

        .banner-sub {
            font-size: 14px;
            color: rgba(255,255,255,0.85);
            font-weight: 600;
        }

        .white-card {
            background: #fff;
            border-radius: 20px;
            padding: 22px 20px;
            margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(124,92,191,0.12);
        }

        .trait-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 18px;
        }

        .trait-chip {
            background: #f3eeff;
            border-radius: 12px;
            padding: 8px 12px;
            border: 2px solid #e0d4f8;
            font-size: 12px;
            font-weight: 700;
            color: #7c5cbf;
            text-align: center;
        }

        .badges {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .badge {
            background: #f3eeff;
            color: #7c5cbf;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            border: 2px solid #e0d4f8;
        }

        .start-intro {
            font-size: 13px;
            color: #7a6a9a;
            line-height: 1.8;
            font-weight: 600;
            margin-bottom: 18px;
            background: #f9f6ff;
            border-radius: 12px;
            padding: 12px 14px;
            border-left: 3px solid #9b7fe8;
            text-align: left;
        }

        .scale-hint {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f3eeff;
            border-radius: 12px;
            padding: 10px 14px;
            margin-bottom: 18px;
            gap: 6px;
        }

        .scale-item {
            text-align: center;
            flex: 1;
        }

        .scale-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            margin: 0 auto 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 900;
        }

        .scale-dot.s1 { background: #9b7fe8; color: #fff; }
        .scale-dot.s2 { background: #d4c8f0; color: #7c5cbf; }
        .scale-dot.s3 { background: #ede8f8; color: #a090c0; }

        .scale-label {
            font-size: 11px;
            color: #9080b0;
            font-weight: 700;
        }

        .start-btn {
            background: linear-gradient(135deg, #9b7fe8 0%, #7c5cbf 100%);
            color: white;
            border: none;
            padding: 16px 0;
            font-size: 18px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            letter-spacing: 2px;
            box-shadow: 0 6px 0 #5a3d9a, 0 8px 16px rgba(124,92,191,0.4);
            transition: transform 0.15s, box-shadow 0.15s;
            font-family: inherit;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #5a3d9a, 0 10px 20px rgba(124,92,191,0.4);
        }

        .start-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #5a3d9a, 0 4px 10px rgba(124,92,191,0.3);
        }

        /* ══ 问题页 ══ */
        #questionPage { display: none; }

        .progress-wrap {
            background: #fff;
            border-radius: 16px;
            padding: 14px 18px;
            margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(124,92,191,0.12);
        }

        .progress-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .progress-num {
            font-size: 13px;
            font-weight: 800;
            color: #7c5cbf;
        }

        .progress-part {
            font-size: 11px;
            color: #b0a0d0;
            font-weight: 600;
        }

        .progress-bar {
            background: #ede8f8;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #9b7fe8, #c4a8ff);
            height: 100%;
            border-radius: 5px;
            transition: width 0.5s ease;
        }

        .q-card {
            background: #fff;
            border-radius: 20px;
            padding: 20px 18px 22px;
            margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(124,92,191,0.12);
        }

        .q-part-tag {
            display: inline-block;
            background: #9b7fe8;
            color: #fff;
            font-size: 11px;
            font-weight: 800;
            padding: 3px 12px;
            border-radius: 20px;
            margin-bottom: 14px;
            letter-spacing: 0.5px;
        }

        .q-text {
            font-size: 16px;
            color: #3d2d6e;
            line-height: 1.7;
            font-weight: 700;
        }

        /* 三选项按钮 */
        .options-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }

        .opt-3 {
            background: #fff;
            border: 2.5px solid #e0d4f8;
            border-radius: 16px;
            padding: 14px 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            width: 100%;
            font-family: inherit;
            box-shadow: 0 3px 0 #e0d4f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .opt-3:hover:not(:disabled) {
            border-color: #9b7fe8;
            background: #f3eeff;
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #c4a8ff;
        }

        .opt-3:active:not(:disabled) {
            transform: translateY(1px);
            box-shadow: 0 2px 0 #c4a8ff;
        }

        .opt-3:disabled { cursor: default; }

        .opt-3.chosen {
            border-color: #9b7fe8;
            background: #f3eeff;
            box-shadow: 0 3px 0 #9b7fe8;
        }

        .opt-3.chosen .opt-3-icon {
            background: #9b7fe8;
            color: #fff;
        }

        .opt-3-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #f3eeff;
            color: #9b7fe8;
            font-size: 14px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .opt-3-text {
            font-size: 12px;
            color: #4a3a7a;
            font-weight: 700;
            line-height: 1.3;
        }

        .opt-3-score {
            font-size: 10px;
            color: #b0a0c8;
            font-weight: 600;
        }

        /* 下一题按钮 */
        .next-btn {
            display: none;
            width: 100%;
            background: linear-gradient(135deg, #9b7fe8 0%, #7c5cbf 100%);
            color: white;
            border: none;
            padding: 16px 0;
            font-size: 16px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 1px;
            box-shadow: 0 6px 0 #5a3d9a, 0 8px 16px rgba(124,92,191,0.35);
            transition: transform 0.15s, box-shadow 0.15s;
            font-family: inherit;
        }

        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #5a3d9a, 0 10px 20px rgba(124,92,191,0.35);
        }

        .next-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #5a3d9a;
        }

        /* ══ 结果页 ══ */
        #resultPage { display: none; }

        .result-banner {
            background: linear-gradient(135deg, #9b7fe8 0%, #7c5cbf 100%);
            border-radius: 24px;
            padding: 28px 24px;
            margin-bottom: 14px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(124,92,191,0.35);
        }

        .result-type-tag {
            display: inline-block;
            background: rgba(255,255,255,0.25);
            color: #fff;
            font-size: 12px;
            font-weight: 800;
            padding: 4px 16px;
            border-radius: 20px;
            margin-bottom: 14px;
            letter-spacing: 2px;
        }

        .result-avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255,255,255,0.6);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            margin: 0 auto 14px;
            display: block;
        }

        .result-name {
            font-size: 28px;
            font-weight: 900;
            color: #fff;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.15);
            letter-spacing: 3px;
            margin-bottom: 4px;
        }

        .result-code {
            font-size: 13px;
            color: rgba(255,255,255,0.75);
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .result-quote {
            font-size: 14px;
            color: rgba(255,255,255,0.9);
            font-style: italic;
            line-height: 1.7;
            font-weight: 600;
        }

        /* 四维度卡片 */
        .dim4-card {
            background: #fff;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(124,92,191,0.12);
        }

        .section-title {
            font-size: 14px;
            font-weight: 900;
            color: #7c5cbf;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dim4-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .dim4-item {
            background: #f3eeff;
            border-radius: 14px;
            padding: 12px 14px;
            border: 2px solid #e0d4f8;
        }

        .dim4-label {
            font-size: 11px;
            color: #9b7fe8;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .dim4-value {
            font-size: 16px;
            font-weight: 900;
            color: #5a3d9a;
            margin-bottom: 2px;
        }

        .dim4-score {
            font-size: 10px;
            color: #b0a0c8;
            font-weight: 600;
        }

        /* 特质雷达 */
        .traits-card {
            background: #fff;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(124,92,191,0.12);
        }

        .trait-bar-item {
            margin-bottom: 10px;
        }

        .trait-bar-item:last-child { margin-bottom: 0; }

        .trait-bar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .trait-bar-name {
            font-size: 12px;
            font-weight: 800;
            color: #6a5a9a;
        }

        .trait-bar-val {
            font-size: 11px;
            font-weight: 700;
            color: #9b7fe8;
        }

        .trait-bar-track {
            background: #ede8f8;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .trait-bar-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, #9b7fe8, #c4a8ff);
            transition: width 1s ease;
        }

        /* 描述卡片 */
        .desc-card {
            background: #fff;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(124,92,191,0.12);
        }

        .desc-card p {
            font-size: 14px;
            color: #5a4a8a;
            line-height: 1.85;
            font-weight: 600;
        }

        /* 建议卡片 */
        .advice-card {
            background: #fff;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(124,92,191,0.12);
        }

        .advice-item {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            align-items: flex-start;
        }

        .advice-item:last-child { margin-bottom: 0; }

        .advice-icon {
            font-size: 18px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .advice-text {
            font-size: 13px;
            color: #6a5a9a;
            line-height: 1.65;
            font-weight: 600;
        }

        /* 免责声明 */
        .disclaimer {
            background: #f9f6ff;
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 14px;
            border: 1px solid #e8e0f8;
        }

        .disclaimer p {
            font-size: 11px;
            color: #b0a0c8;
            line-height: 1.7;
            font-weight: 600;
            text-align: center;
        }

        .restart-btn {
            width: 100%;
            background: linear-gradient(135deg, #9b7fe8 0%, #7c5cbf 100%);
            color: white;
            border: none;
            padding: 16px 0;
            font-size: 16px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 1px;
            box-shadow: 0 6px 0 #5a3d9a, 0 8px 16px rgba(124,92,191,0.35);
            transition: transform 0.15s, box-shadow 0.15s;
            font-family: inherit;
            margin-bottom: 12px;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #5a3d9a, 0 10px 20px rgba(124,92,191,0.35);
        }

        .restart-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #5a3d9a;
        }

        .share-hint {
            text-align: center;
            color: #b0a0c8;
            font-size: 12px;
            font-weight: 600;
        }

        /* ══ 动画 ══ */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.4s ease; }

        @media (max-width: 380px) {
            .banner-title { font-size: 28px; }
            .dim4-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- ══ 开始页 ══ -->
    <div id="startPage" class="fade-in">
        <div class="start-banner">
            <div class="banner-title">角 星 君</div>
            <div class="banner-sub">✦ 人格测试 · 48题完整版 ✦</div>
        </div>

        <div class="white-card">
            <div class="trait-grid">
                <div class="trait-chip">🌐 合群</div>
                <div class="trait-chip">🧠 聪慧</div>
                <div class="trait-chip">🌊 情绪稳定</div>
                <div class="trait-chip">⚔️ 好胜</div>
                <div class="trait-chip">🎉 活泼</div>
                <div class="trait-chip">📋 尽责</div>
                <div class="trait-chip">🦁 大胆</div>
                <div class="trait-chip">🎨 敏感</div>
                <div class="trait-chip">🔍 多疑</div>
                <div class="trait-chip">☁️ 爱幻想</div>
                <div class="trait-chip">🎭 世故</div>
                <div class="trait-chip">😟 爱担心</div>
                <div class="trait-chip">🚀 求新</div>
                <div class="trait-chip">🏔️ 独立</div>
                <div class="trait-chip">⏰ 自律</div>
                <div class="trait-chip">😰 容易紧张</div>
            </div>

            <div class="badges">
                <span class="badge">✦ 共 48 题</span>
                <span class="badge">⏱ 约 5 分钟</span>
                <span class="badge">🔬 16特质测量</span>
                <span class="badge">🌟 16种类型</span>
            </div>

            <div class="start-intro">
                每道题请根据真实情况选择最符合的选项。<br>
                没有对错之分，凭第一直觉作答最准确。
            </div>

            <div class="scale-hint">
                <div class="scale-item">
                    <div class="scale-dot s1">✓</div>
                    <div class="scale-label">符合</div>
                </div>
                <div class="scale-item">
                    <div class="scale-dot s2">≈</div>
                    <div class="scale-label">差不多</div>
                </div>
                <div class="scale-item">
                    <div class="scale-dot s3">✗</div>
                    <div class="scale-label">不符合</div>
                </div>
            </div>

            <button class="start-btn" onclick="startTest()">✦ 开始测试 ✦</button>
        </div>
    </div>

    <!-- ══ 问题页 ══ -->
    <div id="questionPage">
        <div class="progress-wrap">
            <div class="progress-top">
                <span class="progress-num" id="qNum"></span>
                
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="q-card">
            
            <div class="q-text" id="qText"></div>
        </div>

        <div class="options-3" id="optionsList"></div>

        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">继续 →</button>
    </div>

    <!-- ══ 结果页 ══ -->
    <div id="resultPage"></div>

</div>

<script>
// ─────────────────────────────────────────────────────────────
// 题目数据（48题，16特质 × 3题）
// trait: 特质名，score: 选项得分 [符合, 差不多, 不符合]
// ─────────────────────────────────────────────────────────────
const questions = [
    // 一、合群
    { part: "一、合群", trait: "合群", text: "我很容易跟陌生人聊起来。" },
    { part: "一、合群", trait: "合群", text: "出去玩我更喜欢有人陪着，而不是一个人。" },
    { part: "一、合群", trait: "合群", text: "休息日如果有人约我，我会很高兴。" },
    // 二、聪慧
    { part: "二、聪慧", trait: "聪慧", text: "学新东西我比别人快。" },
    { part: "二、聪慧", trait: "聪慧", text: "复杂问题我能很快找到关键点。" },
    { part: "二、聪慧", trait: "聪慧", text: "我喜欢解谜题或琢磨抽象的问题。" },
    // 三、情绪稳定
    { part: "三、情绪稳定", trait: "情绪稳定", text: "大多数时候我心平气和。" },
    { part: "三、情绪稳定", trait: "情绪稳定", text: "遇到不顺心的事，我也不容易发火或崩溃。" },
    { part: "三、情绪稳定", trait: "情绪稳定", text: "我的心情很少大起大落。" },
    // 四、好胜
    { part: "四、好胜", trait: "好胜", text: "团队讨论里我常坚持自己的看法。" },
    { part: "四、好胜", trait: "好胜", text: "我喜欢做拿主意的人，而不是听别人安排。" },
    { part: "四、好胜", trait: "好胜", text: "意见不合时，我愿意争论到底。" },
    // 五、活泼
    { part: "五、活泼", trait: "活泼", text: "朋友觉得我是个爱开玩笑、活跃气氛的人。" },
    { part: "五、活泼", trait: "活泼", text: "我喜欢热闹、刺激的场合。" },
    { part: "五、活泼", trait: "活泼", text: "大多数时候我都觉得心情轻松愉快。" },
    // 六、尽责
    { part: "六、尽责", trait: "尽责", text: "即使没人看着，我也会严格遵守规则。" },
    { part: "六、尽责", trait: "尽责", text: "我答应的事一定会做到。" },
    { part: "六、尽责", trait: "尽责", text: "做人应该有固定的道德准则。" },
    // 七、大胆
    { part: "七、大胆", trait: "大胆", text: "在陌生人面前讲话或表演，我不紧张。" },
    { part: "七、大胆", trait: "大胆", text: "我喜欢冒险或尝试刺激的新事物。" },
    { part: "七、大胆", trait: "大胆", text: "遇到困难时，我通常是第一个站出来的人。" },

// ─────────────────────────────────────────────────────────────
let currentQ = 0;
let traitScores = {
    "合群": 0, "聪慧": 0, "情绪稳定": 0, "好胜": 0,
    "活泼": 0, "尽责": 0, "大胆": 0, "敏感": 0,

};
let answered = false;

// ─────────────────────────────────────────────────────────────
// 开始
// ─────────────────────────────────────────────────────────────
function startTest() {
    document.getElementById('startPage').style.display = 'none';
    const qp = document.getElementById('questionPage');
    qp.style.display = 'block';
    qp.classList.add('fade-in');
    renderQuestion();
}

// ─────────────────────────────────────────────────────────────
// 渲染题目
// ─────────────────────────────────────────────────────────────
function renderQuestion() {
    answered = false;
    document.getElementById('nextBtn').style.display = 'none';

    const q = questions[currentQ];
    const pct = (currentQ / questions.length) * 100;

    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('qNum').textContent = `第 ${currentQ + 1} 题 / 共 ${questions.length} 题`;
    document.getElementById('qText').textContent = q.text;

    const opts = [
        { label: '符合', score: 2, icon: '✓' },
        { label: '差不多', score: 1, icon: '≈' },
        { label: '不符合', score: 0, icon: '✗' }
    ];

    document.getElementById('optionsList').innerHTML = opts.map((opt, i) => `
        <button class="opt-3" id="opt${i}" onclick="selectOption(${i}, ${opt.score})">
            <div class="opt-3-icon">${opt.icon}</div>
            <div class="opt-3-text">${opt.label}</div>

        </button>
    `).join('');
}

// ─────────────────────────────────────────────────────────────
// 选择选项
// ─────────────────────────────────────────────────────────────
function selectOption(idx, score) {
    if (answered) return;
    answered = true;

    const q = questions[currentQ];
    traitScores[q.trait] += score;

    document.querySelectorAll('.opt-3').forEach((btn, i) => {
        btn.disabled = true;
        if (i === idx) btn.classList.add('chosen');
    });

    const nb = document.getElementById('nextBtn');
    nb.style.display = 'block';
    nb.textContent = currentQ < questions.length - 1 ? '继续 →' : '查看我的类型 ✦';
}

// ─────────────────────────────────────────────────────────────
// 下一题
// ─────────────────────────────────────────────────────────────
function nextQuestion() {
    currentQ++;
    if (currentQ < questions.length) {
        const qp = document.getElementById('questionPage');
        qp.classList.remove('fade-in');
        setTimeout(() => { qp.classList.add('fade-in'); renderQuestion(); }, 50);
    } else {
        showResult();
    }
}

// ─────────────────────────────────────────────────────────────
// 计算四维度
// ─────────────────────────────────────────────────────────────
function calcDimensions() {
    const s = traitScores;

    // 1. 外倾性 = (合群 + 活泼 + 大胆) − (多疑 + 爱担心)
    const extroScore = (s["合群"] + s["活泼"] + s["大胆"]) - (s["多疑"] + s["爱担心"]);
    const extro = extroScore >= 0 ? "外放" : "内敛";

    // 2. 情绪稳定性 = 情绪稳定 − (爱担心 + 容易紧张)
    const emoScore = s["情绪稳定"] - (s["爱担心"] + s["容易紧张"]);
    const emo = emoScore >= 0 ? "沉稳" : "易忧";

    // 3. 独立性 = (好胜 + 独立 + 世故) − 合群
    const indScore = (s["好胜"] + s["独立"] + s["世故"]) - s["合群"];
    const ind = indScore >= 0 ? "自主" : "随和";

    // 4. 自律性 = (尽责 + 自律) − (活泼 + 爱幻想)
    const disScore = (s["尽责"] + s["自律"]) - (s["活泼"] + s["爱幻想"]);
    const dis = disScore >= 0 ? "严谨" : "随性";

    return {
        extro, emo, ind, dis,
        extroScore, emoScore, indScore, disScore
    };
}

// ─────────────────────────────────────────────────────────────
// 根据四维度找类型
// ─────────────────────────────────────────────────────────────
function findType(extro, emo, ind, dis) {
    const table = [
        { dims: ["内敛","沉稳","随和","严谨"], code: "守派" },
        { dims: ["内敛","沉稳","随和","随性"], code: "闲派" },
        { dims: ["内敛","沉稳","自主","严谨"], code: "孤派" },
        { dims: ["内敛","沉稳","自主","随性"], code: "独派" },
        { dims: ["内敛","易忧","随和","严谨"], code: "慎派" },
        { dims: ["内敛","易忧","随和","随性"], code: "杞派" },
        { dims: ["内敛","易忧","自主","严谨"], code: "刺派" },
        { dims: ["内敛","易忧","自主","随性"], code: "狼派" },
        { dims: ["外放","沉稳","随和","严谨"], code: "热派" },
        { dims: ["外放","沉稳","随和","随性"], code: "乐派" },
        { dims: ["外放","沉稳","自主","严谨"], code: "领派" },
        { dims: ["外放","沉稳","自主","随性"], code: "冒派" },
        { dims: ["外放","易忧","随和","严谨"], code: "讨派" },
        { dims: ["外放","易忧","随和","随性"], code: "戏派" },
        { dims: ["外放","易忧","自主","严谨"], code: "斗派" },
        { dims: ["外放","易忧","自主","随性"], code: "短派" }
    ];
    const match = table.find(t => t.dims[0]===extro && t.dims[1]===emo && t.dims[2]===ind && t.dims[3]===dis);
    return match ? match.code : "守派";
}

// ─────────────────────────────────────────────────────────────
// 生成结果
// ─────────────────────────────────────────────────────────────
function showResult() {
    const dims = calcDimensions();
    const typeCode = findType(dims.extro, dims.emo, dims.ind, dims.dis);
    const p = personalities[typeCode] || personalities["守派"];

    // 特质得分条（按得分降序取前8）
    const traitList = Object.entries(traitScores)
        .sort((a, b) => b[1] - a[1]);

    const traitBars = traitList.map(([name, score]) => {
        const pct = Math.round((score / 6) * 100);
        return `
        <div class="trait-bar-item">
            <div class="trait-bar-header">
                <span class="trait-bar-name">${traitEmoji[name]} ${name}</span>
                <span class="trait-bar-val">${score}/6</span>
            </div>
            <div class="trait-bar-track">
                <div class="trait-bar-fill" style="width:${pct}%"></div>
            </div>
        </div>`;
    }).join('');

    // 四维度卡片
    const dimCards = [
        { label: "外倾性", value: dims.extro, score: dims.extroScore, desc: "外放 vs 内敛" },
        { label: "情绪稳定", value: dims.emo, score: dims.emoScore, desc: "沉稳 vs 易忧" },
        { label: "独立性", value: dims.ind, score: dims.indScore, desc: "自主 vs 随和" },
        { label: "自律性", value: dims.dis, score: dims.disScore, desc: "严谨 vs 随性" }
    ].map(d => `
        <div class="dim4-item">
            <div class="dim4-label">${d.label}</div>
            <div class="dim4-value">${d.value}</div>
            <div class="dim4-score">${d.desc} · 得分${d.score > 0 ? '+' : ''}${d.score}</div>
        </div>
    `).join('');

    const adviceItems = (p.advice || []).map(a => `
        <div class="advice-item">
            <span class="advice-icon">${a.icon}</span>
            <span class="advice-text">${a.text}</span>
        </div>
    `).join('');

    document.getElementById('questionPage').style.display = 'none';
    const rp = document.getElementById('resultPage');
    rp.style.display = 'block';
    rp.classList.add('fade-in');

    rp.innerHTML = `
        <div class="result-banner">
            <div class="result-type-tag">✦ ${p.code} ✦</div>
            <img class="result-avatar" src="images/${typeCode} ${p.name}.png" alt="${p.name}"
                 onerror="this.style.display='none'">
            <div class="result-name">${p.name}</div>
            <div class="result-code">${p.dims.join(' · ')}</div>
            <p class="result-quote">"${p.quote}"</p>
        </div>

        <div class="dim4-card">
            <div class="section-title">🧭 四维度倾向</div>
            <div class="dim4-grid">${dimCards}</div>
        </div>

        <div class="desc-card">
            <div class="section-title">🌙 你是什么样的人</div>
            <p>${p.desc}</p>
        </div>

        <div class="traits-card">
            <div class="section-title">📊 16特质得分</div>
            ${traitBars}
        </div>

        <div class="advice-card">
            <div class="section-title">💡 给你的建议</div>
            ${adviceItems}
        </div>

        <div class="disclaimer">
            <p>⚠️ 本测试基于心理学特质理论，结果仅供参考。<br>人的复杂性远超任何测试，请勿用结果定义自己或他人。</p>
        </div>

        <button class="restart-btn" onclick="restartTest()">✦ 重新测试 ✦</button>
        <p class="share-hint">截图分享给朋友，看看你们是什么类型～</p>
    `;
}

// ─────────────────────────────────────────────────────────────
// 重新测试
// ─────────────────────────────────────────────────────────────
function restartTest() {
    currentQ = 0;
    traitScores = {
        "合群": 0, "聪慧": 0, "情绪稳定": 0, "好胜": 0,
        "活泼": 0, "尽责": 0, "大胆": 0, "敏感": 0,
        "多疑": 0, "爱幻想": 0, "世故": 0, "爱担心": 0,
        "求新": 0, "独立": 0, "自律": 0, "容易紧张": 0
    };
    answered = false;

    document.getElementById('resultPage').style.display = 'none';
    const sp = document.getElementById('startPage');
    sp.style.display = 'block';
    sp.classList.add('fade-in');
}
</script>
