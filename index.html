<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角星君 · 亲密关系人格测试</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #e8e0f8 0%, #d4c8f0 40%, #c8bce8 100%);
            min-height: 100vh;
            padding: 20px 16px 40px;
        }

        .container { max-width: 420px; margin: 0 auto; }

        /* ══ 开始页 ══ */
        #startPage { text-align: center; }

        /* 顶部 Banner */
        .start-banner {
            background: linear-gradient(135deg, #9b7fe8 0%, #7c5cbf 100%);
            border-radius: 24px;
            padding: 28px 24px 24px;
            margin-bottom: 18px;
            box-shadow: 0 8px 24px rgba(124,92,191,0.35);
            position: relative;
            overflow: hidden;
        }

        .start-banner::before {
            content: '';
            position: absolute;
            top: -20px; right: -20px;
            width: 100px; height: 100px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .banner-title {
            font-size: 36px;
            font-weight: 900;
            color: #fff;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.15);
            letter-spacing: 2px;
            line-height: 1.2;
            margin-bottom: 6px;
        }

        .banner-sub {
            font-size: 14px;
            color: rgba(255,255,255,0.85);
            font-weight: 600;
        }

        /* 白色内容卡片 */
        .white-card {
            background: #fff;
            border-radius: 20px;
            padding: 22px 20px;
            margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(124,92,191,0.12);
        }

        .dim-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 18px;
        }

        .dim-card {
            background: #f3eeff;
            border-radius: 14px;
            padding: 12px 14px;
            border: 2px solid #e0d4f8;
        }

        .dim-card .dim-title {
            font-size: 13px;
            font-weight: 800;
            color: #7c5cbf;
            margin-bottom: 4px;
        }

        .dim-card .dim-vs {
            font-size: 11px;
            color: #a090c0;
            line-height: 1.6;
        }

        .badges {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .badge {
            background: #f3eeff;
            color: #7c5cbf;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            border: 2px solid #e0d4f8;
        }

        .start-btn {
            background: linear-gradient(135deg, #9b7fe8 0%, #7c5cbf 100%);
            color: white;
            border: none;
            padding: 16px 0;
            font-size: 18px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            letter-spacing: 2px;
            box-shadow: 0 6px 0 #5a3d9a, 0 8px 16px rgba(124,92,191,0.4);
            transition: transform 0.15s, box-shadow 0.15s;
            font-family: inherit;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #5a3d9a, 0 10px 20px rgba(124,92,191,0.4);
        }

        .start-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #5a3d9a, 0 4px 10px rgba(124,92,191,0.3);
        }

        /* ══ 问题页 ══ */
        #questionPage { display: none; }

        /* 进度条 */
        .progress-wrap {
            background: #fff;
            border-radius: 16px;
            padding: 14px 18px;
            margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(124,92,191,0.12);
        }

        .progress-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .progress-num {
            font-size: 13px;
            font-weight: 800;
            color: #7c5cbf;
        }

        .progress-dim {
            font-size: 11px;
            color: #b0a0d0;
            font-weight: 600;
        }

        .progress-bar {
            background: #ede8f8;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #9b7fe8, #c4a8ff);
            height: 100%;
            border-radius: 5px;
            transition: width 0.5s ease;
        }

        /* 问题卡片：图片 + 气泡 */
        .q-card {
            background: #fff;
            border-radius: 20px;
            padding: 18px 18px 20px;
            margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(124,92,191,0.12);
        }

        .q-label-tag {
            display: inline-block;
            background: #9b7fe8;
            color: #fff;
            font-size: 11px;
            font-weight: 800;
            padding: 3px 12px;
            border-radius: 20px;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .q-bubble-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .q-char-img {
            width: 72px;
            height: 72px;
            object-fit: contain;
            flex-shrink: 0;
            filter: drop-shadow(0 4px 8px rgba(124,92,191,0.25));
        }

        .q-char-placeholder {
            width: 72px;
            height: 72px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #e8d8ff, #d0c0f0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .q-bubble {
            flex: 1;
            background: #f3eeff;
            border-radius: 0 16px 16px 16px;
            padding: 12px 14px;
            position: relative;
        }

        .q-bubble::before {
            content: '';
            position: absolute;
            left: -10px;
            top: 12px;
            border: 5px solid transparent;
            border-right-color: #f3eeff;
        }

        .q-bubble .q-title {
            font-size: 11px;
            color: #9b7fe8;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: 0.3px;
        }

        .q-bubble .q-text {
            font-size: 14px;
            color: #3d2d6e;
            line-height: 1.65;
            font-weight: 600;
        }

        /* 选项网格 */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 14px;
        }

        .opt-btn {
            background: #fff;
            border: 2.5px solid #e0d4f8;
            border-radius: 16px;
            padding: 14px 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            width: 100%;
            font-family: inherit;
            box-shadow: 0 3px 0 #e0d4f8;
        }

        .opt-btn:hover:not(:disabled) {
            border-color: #9b7fe8;
            background: #f3eeff;
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #c4a8ff;
        }

        .opt-btn:active:not(:disabled) {
            transform: translateY(1px);
            box-shadow: 0 2px 0 #c4a8ff;
        }

        .opt-btn:disabled { cursor: default; }

        .opt-btn.chosen {
            border-color: #9b7fe8;
            background: #f3eeff;
            box-shadow: 0 3px 0 #9b7fe8;
        }

        .opt-letter {
            display: inline-block;
            font-size: 11px;
            font-weight: 900;
            color: #9b7fe8;
            margin-bottom: 5px;
        }

        .opt-btn.chosen .opt-letter { color: #7c5cbf; }

        .opt-text {
            font-size: 13px;
            color: #4a3a7a;
            line-height: 1.5;
            font-weight: 600;
            display: block;
        }

        /* 单列选项（Q5 四选项） */
        .options-col {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 14px;
        }

        .options-col .opt-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 13px 16px;
        }

        .options-col .opt-letter {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #f3eeff;
            color: #9b7fe8;
            font-size: 12px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-bottom: 0;
        }

        .options-col .opt-btn.chosen .opt-letter {
            background: #9b7fe8;
            color: #fff;
        }

        /* 即时反馈 */
        .feedback-box {
            display: none;
            background: #fff;
            border-radius: 16px;
            padding: 14px 16px;
            margin-bottom: 14px;
            border-left: 4px solid #9b7fe8;
            box-shadow: 0 4px 16px rgba(124,92,191,0.1);
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .fb-label {
            font-size: 11px;
            color: #9b7fe8;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .fb-text {
            font-size: 13px;
            color: #6a5a9a;
            line-height: 1.7;
            font-weight: 600;
        }

        /* 下一题按钮 */
        .next-btn {
            display: none;
            width: 100%;
            background: linear-gradient(135deg, #9b7fe8 0%, #7c5cbf 100%);
            color: white;
            border: none;
            padding: 16px 0;
            font-size: 16px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 1px;
            box-shadow: 0 6px 0 #5a3d9a, 0 8px 16px rgba(124,92,191,0.35);
            transition: transform 0.15s, box-shadow 0.15s;
            font-family: inherit;
        }

        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #5a3d9a, 0 10px 20px rgba(124,92,191,0.35);
        }

        .next-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #5a3d9a;
        }

        /* ══ 结果页 ══ */
        #resultPage { display: none; }

        /* 结果 Banner */
        .result-banner {
            background: linear-gradient(135deg, #9b7fe8 0%, #7c5cbf 100%);
            border-radius: 24px;
            padding: 28px 24px;
            margin-bottom: 14px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(124,92,191,0.35);
        }

        .result-type-tag {
            display: inline-block;
            background: rgba(255,255,255,0.25);
            color: #fff;
            font-size: 12px;
            font-weight: 800;
            padding: 4px 16px;
            border-radius: 20px;
            margin-bottom: 14px;
            letter-spacing: 2px;
        }

        .result-avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255,255,255,0.6);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            margin: 0 auto 14px;
            display: block;
        }

        .result-name {
            font-size: 32px;
            font-weight: 900;
            color: #fff;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.15);
            letter-spacing: 4px;
            margin-bottom: 6px;
        }

        .result-mnemonic {
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .result-quote {
            font-size: 14px;
            color: rgba(255,255,255,0.9);
            font-style: italic;
            line-height: 1.7;
            font-weight: 600;
        }

        /* 光谱卡片 */
        .spectrum-card {
            background: #fff;
            border-radius: 20px;
            padding: 18px 18px;
            margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(124,92,191,0.12);
        }

        .section-title {
            font-size: 14px;
            font-weight: 900;
            color: #7c5cbf;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .spectrum-item { margin-bottom: 14px; }
        .spectrum-item:last-child { margin-bottom: 0; }

        .spectrum-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #9080b0;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .spectrum-labels .s-mid {
            color: #c0b0d8;
            font-size: 10px;
        }

        .spectrum-track {
            position: relative;
            background: #ede8f8;
            height: 10px;
            border-radius: 5px;
            overflow: visible;
        }

        .spectrum-fill {
            height: 100%;
            border-radius: 5px;
            background: linear-gradient(90deg, #9b7fe8, #c4a8ff);
            transition: width 1.2s ease;
        }

        .spectrum-midline {
            position: absolute;
            left: 50%;
            top: -3px;
            width: 2px;
            height: 16px;
            background: #c0b0d8;
            transform: translateX(-50%);
            border-radius: 1px;
        }

        .spectrum-tendency {
            font-size: 10px;
            color: #b0a0c8;
            margin-top: 3px;
            text-align: center;
            font-weight: 700;
        }

        /* 描述卡片 */
        .desc-card {
            background: #fff;
            border-radius: 20px;
            padding: 18px 18px;
            margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(124,92,191,0.12);
        }

        .desc-card p {
            font-size: 14px;
            color: #5a4a8a;
            line-height: 1.85;
            font-weight: 600;
        }

        /* CP 配对 */
        .cp-card-wrap {
            background: #fff;
            border-radius: 20px;
            padding: 18px 18px;
            margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(124,92,191,0.12);
        }

        .cp-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .cp-card {
            background: #f3eeff;
            border: 2px solid #e0d4f8;
            border-radius: 16px;
            padding: 12px 8px;
            text-align: center;
        }

        .cp-type-label {
            font-size: 10px;
            color: #9b7fe8;
            font-weight: 900;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .cp-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #c4a8ff;
            margin: 0 auto 7px;
            display: block;
        }

        .cp-code {
            font-size: 13px;
            color: #7c5cbf;
            font-weight: 900;
            margin-bottom: 2px;
            letter-spacing: 1px;
        }

        .cp-name {
            font-size: 12px;
            color: #9080b0;
            font-weight: 700;
        }

        .cp-desc {
            font-size: 10px;
            color: #b0a0c8;
            margin-top: 4px;
            line-height: 1.4;
            font-weight: 600;
        }

        /* 重新测试按钮 */
        .restart-btn {
            width: 100%;
            background: linear-gradient(135deg, #9b7fe8 0%, #7c5cbf 100%);
            color: white;
            border: none;
            padding: 16px 0;
            font-size: 16px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 1px;
            box-shadow: 0 6px 0 #5a3d9a, 0 8px 16px rgba(124,92,191,0.35);
            transition: transform 0.15s, box-shadow 0.15s;
            font-family: inherit;
            margin-bottom: 12px;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #5a3d9a, 0 10px 20px rgba(124,92,191,0.35);
        }

        .restart-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #5a3d9a;
        }

        .share-hint {
            text-align: center;
            color: #b0a0c8;
            font-size: 12px;
            font-weight: 600;
        }

        /* ══ 动画 ══ */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.4s ease; }

        /* ══ 响应式 ══ */
        @media (max-width: 380px) {
            .banner-title { font-size: 28px; }
            .options-grid { grid-template-columns: 1fr; }
            .cp-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- ══ 开始页 ══ -->
    <div id="startPage" class="fade-in">
        <div class="start-banner">
            <div class="banner-title">角 星 君</div>
            <div class="banner-sub">✦ 亲密关系人格测试 ✦</div>
        </div>

        <div class="white-card">
            <div class="dim-grid">
                <div class="dim-card">
                    <div class="dim-title">深沉 · 旷达</div>
                    <div class="dim-vs">D 沉入内心深处<br>vs W 旷野自由流动</div>
                </div>
                <div class="dim-card">
                    <div class="dim-title">映照 · 陪伴</div>
                    <div class="dim-vs">M 敏感细腻映照<br>vs P 平静稳定陪伴</div>
                </div>
                <div class="dim-card">
                    <div class="dim-title">隐语 · 鸣响</div>
                    <div class="dim-vs">S 沉默藏于心底<br>vs V 鸣响说出来</div>
                </div>
                <div class="dim-card">
                    <div class="dim-title">炼化 · 融合</div>
                    <div class="dim-vs">F 直面炼化冲突<br>vs L 融合等待消散</div>
                </div>
            </div>

            <div class="badges">
                <span class="badge">✦ 共 5 题</span>
                <span class="badge">⏱ 约 2 分钟</span>
                <span class="badge">💫 即时反馈</span>
                <span class="badge">🌙 CP 配对</span>
            </div>

            <button class="start-btn" onclick="startTest()">✦ 开始测试 ✦</button>
        </div>
    </div>

    <!-- ══ 问题页 ══ -->
    <div id="questionPage">
        <div class="progress-wrap">
            <div class="progress-top">
                <span class="progress-num" id="qNum"></span>
                <span class="progress-dim" id="qDim"></span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="q-card">
            <div class="q-label-tag" id="qLabel"></div>
            <div class="q-bubble-row">
                <div class="q-char-placeholder">✦</div>
                <div class="q-bubble">
                    <div class="q-title" id="qTitle"></div>
                    <div class="q-text" id="qText"></div>
                </div>
            </div>
        </div>

        <div id="optionsList"></div>

        <div class="feedback-box" id="feedbackBox">
            <div class="fb-label">✦ 角星君说</div>
            <div class="fb-text" id="feedbackText"></div>
        </div>

        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">继续 →</button>
    </div>

    <!-- ══ 结果页 ══ -->
    <div id="resultPage"></div>

</div>

<script>
// ─────────────────────────────────────────────────────────────
// 题目数据
// ─────────────────────────────────────────────────────────────
const questions = [
    {
        label: "Q1 · 聚会的角落",
        title: "测量维度：深沉 / 旷达",
        dim: "D / W",
        layout: "grid",
        text: "朋友的生日聚会，二十多人，音乐很吵，气氛很热。一小时后，你发现自己——",
        options: [
            {
                label: "A",
                text: "退到阳台/角落，看热闹感平静",
                feedback: "你在喧嚣里需要一片安静的水面。不是不喜欢，是你的能量在深处流动，需要一点空间才能呼吸。",
                scores: { D: 1, W: 0, M: 0, P: 0, S: 0, V: 0, F: 0, L: 0 }
            },
            {
                label: "B",
                text: "和人聊得尽兴，享受能量流动",
                feedback: "人群对你来说是燃料，不是消耗。你在流动中找到自己，越热闹越清醒。",
                scores: { D: 0, W: 1, M: 0, P: 0, S: 0, V: 0, F: 0, L: 0 }
            }
        ]
    },
    {
        label: "Q2 · 深夜已读不回",
        title: "测量维度：映照 / 陪伴",
        dim: "M / P",
        layout: "grid",
        text: "凌晨一点发重要消息给在乎的人，已读不回。你会——",
        options: [
            {
                label: "A",
                text: "反复揣测，怕自己说错",
                feedback: "你的心是一面镜子，照见对方的每一个细节，也照见自己的每一丝不安。这是敏感，也是深情。",
                scores: { D: 0, W: 0, M: 1, P: 0, S: 0, V: 0, F: 0, L: 0 }
            },
            {
                label: "B",
                text: "理解对方忙/睡了，不纠结",
                feedback: "你给关系留了呼吸的空间。不是不在乎，是你相信那份连接不会因为一条消息而断裂。",
                scores: { D: 0, W: 0, M: 0, P: 1, S: 0, V: 0, F: 0, L: 0 }
            }
        ]
    },
    {
        label: "Q3 · 说不出口的话",

// ─────────────────────────────────────────────────────────────
const personalities = {
    "DMSF": { name: "渊镜", mnemonic: "沉 · 映 · 隐 · 炼", quote: "我在最深处，带着伤痕等你", desc: "你是一面深渊里的镜子。沉默不是冷漠，是你把所有感受都压进了最深处，等待一个真正走近的人。你敏感、细腻，能照见别人看不见的东西，也能在冲突里直面真相。你的爱，是最重的那种。" },

    "DMVF": { name: "珠泪", mnemonic: "沉 · 映 · 鸣 · 炼", quote: "每一颗珍珠，都是没哭出来的夜晚", desc: "你沉入内心，却不甘于沉默。你敏感地感知，然后选择说出来——不是为了倾诉，是为了真正被看见。你愿意直面冲突，把那些没哭出来的夜晚，炼成珍珠。你的爱，是最勇敢的那种。" },
    "DMVL": { name: "月栖", mnemonic: "沉 · 映 · 鸣 · 融", quote: "我不刺眼，但我一直亮着", desc: "你像月亮一样——沉静，却有光。你敏感地感知，愿意说出来，但不强迫，不撕裂，只是温柔地等待时机。你的爱是最稳定的那种，不耀眼，但一直在。" },
    "DPSF": { name: "双潜", mnemonic: "沉 · 伴 · 隐 · 炼", quote: "你不必懂我，只需和我一起沉默", desc: "你不需要被完全理解，只需要一个愿意和你一起沉默的人。你稳定、平静，不纠结细节，但在冲突来临时，你会直面它。你的爱，是最踏实的那种。" },
    "DPSL": { name: "幽舟", mnemonic: "沉 · 伴 · 隐 · 融", quote: "我们不说话，这艘船知道方向", desc: "你和对方之间不需要太多语言，只需要同一个方向。你平静、稳定，不纠结，不撕裂，只是默默地陪着，让时间做它该做的事。你的爱，是最安心的那种。" },

    "DPVL": { name: "蓝鲸", mnemonic: "沉 · 伴 · 鸣 · 融", quote: "全世界听不到，但你可以", desc: "你像蓝鲸一样，在深海里发出只有特定频率才能接收的声音。你平静地陪伴，愿意说出来，但不强迫，只是等待那个能听见你的人。你的爱，是最深情的那种。" },
    "WMSF": { name: "野镜", mnemonic: "旷 · 映 · 隐 · 炼", quote: "风里有你的样子", desc: "你在旷野里流动，却有一面敏感的镜子。你感知着风里的每一个细节，把它们藏在心里，在冲突来临时直面它。你的爱，是最自由也最深刻的那种。" },
    "WMSL": { name: "星守", mnemonic: "旷 · 映 · 隐 · 融", quote: "我哪儿都不去，我在这里等你", desc: "你自由流动，却有一颗守候的心。你敏感地感知，选择沉默，用时间和温柔来融化一切。你的爱，是最温柔的守候——我哪儿都不去，我在这里。" },
    "WMVF": { name: "篝语", mnemonic: "旷 · 映 · 鸣 · 炼", quote: "夜很长，我们慢慢说", desc: "你像篝火旁的夜晚——旷野、温暖、有话要说。你敏感地感知，愿意说出来，也愿意直面冲突。你的爱，是最有温度的那种，夜很长，你不急，但你想说完。" },
    "WMVL": { name: "回声", mnemonic: "旷 · 映 · 鸣 · 融", quote: "你说什么都好听，因为是你在说", desc: "你是旷野里的回声——自由流动，敏感感知，愿意说出来，也愿意等待。你的爱，是最温柔的共鸣，你不强迫，只是把对方的声音接住，再轻轻还给他。" },
    "WPSF": { name: "孤星", mnemonic: "旷 · 伴 · 隐 · 炼", quote: "我不靠近，但我为你亮着", desc: "你像一颗孤星——自由、稳定、沉默，却在需要的时候直面一切。你不需要时刻靠近，但你一直亮着。你的爱，是最独立也最坚定的那种。" },
    "WPSL": { name: "风旅", mnemonic: "旷 · 伴 · 隐 · 融", quote: "我们不必同路，只需同一片风", desc: "你和对方不需要时刻在一起，只需要同一片风。你自由、平静、沉默，用时间和空间来融化一切。你的爱，是最自由的那种——不占有，只陪伴。" },
    "WPVF": { name: "野火", mnemonic: "旷 · 伴 · 鸣 · 炼", quote: "要不，把这世界点着？", desc: "你是旷野里的一把火——自由、平静，却有话要说，也敢于直面冲突。你的爱，是最有力量的那种，不是温柔的守候，是把世界点着，然后问你：来不来？" },
    "WPVL": { name: "星尘", mnemonic: "旷 · 伴 · 鸣 · 融", quote: "我们迟早会在某颗星星上重逢", desc: "你像星尘一样——自由流动，平静陪伴，愿意说出来，也愿意等待。你的爱，是最浪漫的那种，不执着于此刻，相信迟早会在某颗星星上重逢。" }
};

const cpTable = {
    "DMSF": { soul: "WMVL", night: "DPSL", mirror: "WPSF" },
    "DMSL": { soul: "WMVF", night: "DMSF", mirror: "WPVF" },
    "DMVF": { soul: "WPSL", night: "DMVL", mirror: "DPVL" },
    "DMVL": { soul: "WMSF", night: "DMVF", mirror: "DPSF" },
    "DPSF": { soul: "WPSF", night: "DMSF", mirror: "WMVL" },
    "DPSL": { soul: "WPSL", night: "DMSF", mirror: "WMVF" },
    "DPVF": { soul: "WMSL", night: "WPVF", mirror: "DMVL" },
    "DPVL": { soul: "WMVF", night: "DPSL", mirror: "DMSF" },
    "WMSF": { soul: "DMVL", night: "WPSF", mirror: "DPVL" },
    "WMSL": { soul: "DPVF", night: "DMSL", mirror: "WPVF" },
    "WMVF": { soul: "DMSL", night: "WMVL", mirror: "DPSF" },
    "WMVL": { soul: "DMSF", night: "WMVF", mirror: "WPSF" },
    "WPSF": { soul: "DPSF", night: "WMSF", mirror: "WMVL" },
    "WPSL": { soul: "DPSL", night: "WPVL", mirror: "DMSF" },
    "WPVF": { soul: "WMSL", night: "DPVF", mirror: "DMVL" },
    "WPVL": { soul: "DPVL", night: "WPSL", mirror: "WMVF" }
};

const cpTypeLabel = {
    soul:   { label: "灵魂伴侣", desc: "最佳张力与平衡" },
    night:  { label: "深夜挚友", desc: "天然理解，默契深厚" },
    mirror: { label: "成长之镜", desc: "有冲突但带来成长" }
};

const dimInfo = [
    { leftKey: "D", rightKey: "W", leftLabel: "D 深沉", rightLabel: "W 旷达", name: "深沉/旷达" },
    { leftKey: "M", rightKey: "P", leftLabel: "M 映照", rightLabel: "P 陪伴", name: "映照/陪伴" },
    { leftKey: "S", rightKey: "V", leftLabel: "S 隐语", rightLabel: "V 鸣响", name: "隐语/鸣响" },
    { leftKey: "F", rightKey: "L", leftLabel: "F 炼化", rightLabel: "L 融合", name: "炼化/融合" }
];

// ─────────────────────────────────────────────────────────────
// 状态
// ─────────────────────────────────────────────────────────────
let currentQ = 0;
let rawScores = { D: 0, W: 0, M: 0, P: 0, S: 0, V: 0, F: 0, L: 0 };
let chosenOptions = [];
let answered = false;

// ─────────────────────────────────────────────────────────────
// 开始
// ─────────────────────────────────────────────────────────────
function startTest() {
    document.getElementById('startPage').style.display = 'none';
    const qp = document.getElementById('questionPage');
    qp.style.display = 'block';
    qp.classList.add('fade-in');
    renderQuestion();
}

// ─────────────────────────────────────────────────────────────
// 渲染题目
// ─────────────────────────────────────────────────────────────
function renderQuestion() {
    answered = false;
    document.getElementById('feedbackBox').style.display = 'none';
    document.getElementById('nextBtn').style.display = 'none';

    const q = questions[currentQ];
    const pct = (currentQ / questions.length) * 100;

    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('qNum').textContent = `第 ${currentQ + 1} 题 / 共 ${questions.length} 题`;
    document.getElementById('qDim').textContent = q.dim;
    document.getElementById('qLabel').textContent = q.label;
    document.getElementById('qTitle').textContent = q.title;
    document.getElementById('qText').textContent = q.text;

    // 根据选项数量决定布局
    const isGrid = q.layout === 'grid';
    const wrapClass = isGrid ? 'options-grid' : 'options-col';

    const html = `<div class="${wrapClass}">` + q.options.map((opt, i) => `
        <button class="opt-btn" id="opt${i}" onclick="selectOption(${i})">
            <span class="opt-letter">${opt.label}</span>
            <span class="opt-text">${opt.text}</span>
        </button>
    `).join('') + `</div>`;

    document.getElementById('optionsList').innerHTML = html;
}

// ─────────────────────────────────────────────────────────────
// 选择选项
// ─────────────────────────────────────────────────────────────
function selectOption(idx) {
    if (answered) return;
    answered = true;

    const q = questions[currentQ];
    const opt = q.options[idx];

    Object.keys(opt.scores).forEach(k => { rawScores[k] += opt.scores[k]; });
    chosenOptions.push({ qIdx: currentQ, optIdx: idx });

    document.querySelectorAll('.opt-btn').forEach((btn, i) => {
        btn.disabled = true;
        if (i === idx) btn.classList.add('chosen');
    });

    document.getElementById('feedbackText').textContent = opt.feedback;
    document.getElementById('feedbackBox').style.display = 'block';

    const nb = document.getElementById('nextBtn');
    nb.style.display = 'block';
    nb.textContent = currentQ < questions.length - 1 ? '继续 →' : '查看我的星图 ✦';
}

// ─────────────────────────────────────────────────────────────
// 下一题
// ─────────────────────────────────────────────────────────────
function nextQuestion() {
    currentQ++;
    if (currentQ < questions.length) {
        const qp = document.getElementById('questionPage');
        qp.classList.remove('fade-in');
        setTimeout(() => { qp.classList.add('fade-in'); renderQuestion(); }, 50);
    } else {
        showResult();
    }
}

// ─────────────────────────────────────────────────────────────
// 生成结果
// ─────────────────────────────────────────────────────────────
function showResult() {
    const D = rawScores.D >= rawScores.W ? 'D' : 'W';
    const M = rawScores.M >= rawScores.P ? 'M' : 'P';
    const S = rawScores.S >= rawScores.V ? 'S' : 'V';
    const F = rawScores.F >= rawScores.L ? 'F' : 'L';
    const code = D + M + S + F;

    const p = personalities[code] || personalities['DMSF'];
    const cp = cpTable[code] || cpTable['DMSF'];

    function pairPct(aKey, bKey) {
        const a = rawScores[aKey], b = rawScores[bKey];
        const total = a + b;
        if (total === 0) return 50;
        return Math.round((a / total) * 100);
    }

    const spectrumBars = dimInfo.map(d => {
        const pct = pairPct(d.leftKey, d.rightKey);
        let tendency = '平衡';
        if (pct > 60)      tendency = `偏 ${d.leftLabel}`;
        else if (pct < 40) tendency = `偏 ${d.rightLabel}`;
        return `
        <div class="spectrum-item">
            <div class="spectrum-labels">
                <span>${d.leftLabel}</span>
                <span class="s-mid">${d.name}</span>
                <span>${d.rightLabel}</span>
            </div>
            <div class="spectrum-track">
                <div class="spectrum-fill" style="width:${pct}%"></div>
                <div class="spectrum-midline"></div>
            </div>
            <div class="spectrum-tendency">${tendency}</div>
        </div>`;
    }).join('');

    const cpCards = ['soul', 'night', 'mirror'].map(type => {
        const cpCode = cp[type];
        const cpP = personalities[cpCode] || { name: '—', mnemonic: '' };
        const info = cpTypeLabel[type];
        return `
        <div class="cp-card">
            <div class="cp-type-label">${info.label}</div>
            <img class="cp-avatar" src="images/${cpCode} ${cpP.name}.png" alt="${cpP.name}" onerror="this.style.display='none'">
            <div class="cp-code">${cpCode}</div>
            <div class="cp-name">${cpP.name}</div>
            <div class="cp-desc">${info.desc}</div>
        </div>`;
    }).join('');

    document.getElementById('questionPage').style.display = 'none';
    const rp = document.getElementById('resultPage');
    rp.style.display = 'block';
    rp.classList.add('fade-in');

    rp.innerHTML = `
        <div class="result-banner">
            <div class="result-type-tag">✦ ${code} ✦</div>
            <img class="result-avatar" src="images/${code} ${p.name}.png" alt="${p.name}" onerror="this.style.display='none'">
            <div class="result-name">${p.name}</div>
            <div class="result-mnemonic">${p.mnemonic}</div>
            <p class="result-quote">"${p.quote}"</p>
        </div>

        <div class="spectrum-card">
            <div class="section-title">📊 你的关系光谱</div>
            ${spectrumBars}
        </div>

        <div class="desc-card">
            <div class="section-title">🌙 你在关系里的样子</div>
            <p>${p.desc}</p>
        </div>

        <div class="cp-card-wrap">
            <div class="section-title">✦ 你的 CP 配对</div>
            <div class="cp-grid">${cpCards}</div>
        </div>

        <button class="restart-btn" onclick="restartTest()">✦ 重新测试 ✦</button>
        <p class="share-hint">截图分享给朋友，看看你们是什么配对～</p>
    `;
}

// ─────────────────────────────────────────────────────────────
// 重新测试
// ─────────────────────────────────────────────────────────────
function restartTest() {
    currentQ = 0;
    rawScores = { D: 0, W: 0, M: 0, P: 0, S: 0, V: 0, F: 0, L: 0 };
    chosenOptions = [];
    answered = false;

    document.getElementById('resultPage').style.display = 'none';
    const sp = document.getElementById('startPage');
    sp.style.display = 'block';
    sp.classList.add('fade-in');
}
</script>
