<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>角星君 · 亲密关系人格测试</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #e8e0f8 0%, #d4c8f0 40%, #c8bce8 100%);
            min-height: 100vh;
            padding: 20px 16px 40px;
        }

        .container { max-width: 420px; margin: 0 auto; }

        /* ══ 开始页 ══ */
        #startPage { text-align: center; }

        .start-banner {
            background: linear-gradient(135deg, #9b7fe8 0%, #7c5cbf 100%);
            border-radius: 24px;
            padding: 28px 24px 24px;
            margin-bottom: 18px;
            box-shadow: 0 8px 24px rgba(124,92,191,0.35);
            position: relative;
            overflow: hidden;
        }

        .start-banner::before {
            content: '';
            position: absolute;
            top: -20px; right: -20px;
            width: 100px; height: 100px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .banner-title {
            font-size: 36px;
            font-weight: 900;
            color: #fff;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.15);
            letter-spacing: 2px;
            line-height: 1.2;
            margin-bottom: 6px;
        }

        .banner-sub {
            font-size: 14px;
            color: rgba(255,255,255,0.85);
            font-weight: 600;
        }

        .white-card {
            background: #fff;
            border-radius: 20px;
            padding: 22px 20px;
            margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(124,92,191,0.12);
        }

        .dim-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 18px;
        }

        .dim-card {
            background: #f3eeff;
            border-radius: 14px;
            padding: 12px 14px;
            border: 2px solid #e0d4f8;
        }

        .dim-card .dim-title {
            font-size: 13px;
            font-weight: 800;
            color: #7c5cbf;
            margin-bottom: 4px;
        }

        .dim-card .dim-vs {
            font-size: 11px;
            color: #a090c0;
            line-height: 1.6;
        }

        .badges {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .badge {
            background: #f3eeff;
            color: #7c5cbf;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            border: 2px solid #e0d4f8;
        }

        .start-intro {
            font-size: 13px;
            color: #7a6a9a;
            line-height: 1.8;
            font-weight: 600;
            margin-bottom: 18px;
            background: #f9f6ff;
            border-radius: 12px;
            padding: 12px 14px;
            border-left: 3px solid #9b7fe8;
            text-align: left;
        }

        .start-btn {
            background: linear-gradient(135deg, #9b7fe8 0%, #7c5cbf 100%);
            color: white;
            border: none;
            padding: 16px 0;
            font-size: 18px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            letter-spacing: 2px;
            box-shadow: 0 6px 0 #5a3d9a, 0 8px 16px rgba(124,92,191,0.4);
            transition: transform 0.15s, box-shadow 0.15s;
            font-family: inherit;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #5a3d9a, 0 10px 20px rgba(124,92,191,0.4);
        }

        .start-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #5a3d9a, 0 4px 10px rgba(124,92,191,0.3);
        }

        /* ══ 问题页 ══ */
        #questionPage { display: none; }

        .progress-wrap {
            background: #fff;
            border-radius: 16px;
            padding: 14px 18px;
            margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(124,92,191,0.12);
        }

        .progress-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .progress-num {
            font-size: 13px;
            font-weight: 800;
            color: #7c5cbf;
        }

        .progress-dim {
            font-size: 11px;
            color: #b0a0d0;
            font-weight: 600;
        }

        .progress-bar {
            background: #ede8f8;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #9b7fe8, #c4a8ff);
            height: 100%;
            border-radius: 5px;
            transition: width 0.5s ease;
        }

        .q-card {
            background: #fff;
            border-radius: 20px;
            padding: 18px 18px 20px;
            margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(124,92,191,0.12);
        }

        .q-label-tag {
            display: inline-block;
            background: #9b7fe8;
            color: #fff;
            font-size: 11px;
            font-weight: 800;
            padding: 3px 12px;
            border-radius: 20px;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .q-bubble-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .q-char-placeholder {
            width: 72px;
            height: 72px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #e8d8ff, #d0c0f0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .q-bubble {
            flex: 1;
            background: #f3eeff;
            border-radius: 0 16px 16px 16px;
            padding: 12px 14px;
            position: relative;
        }

        .q-bubble::before {
            content: '';
            position: absolute;
            left: -10px;
            top: 12px;
            border: 5px solid transparent;
            border-right-color: #f3eeff;
        }

        .q-bubble .q-title {
            font-size: 11px;
            color: #9b7fe8;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: 0.3px;
        }

        .q-bubble .q-text {
            font-size: 14px;
            color: #3d2d6e;
            line-height: 1.65;
            font-weight: 600;
        }

        .q-scene {
            font-size: 12px;
            color: #9080b0;
            font-weight: 600;
            margin-top: 6px;
            font-style: italic;
        }

        /* 五点量表选项 */
        .options-5pt {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 14px;
        }

        .opt-btn-5pt {
            background: #fff;
            border: 2.5px solid #e0d4f8;
            border-radius: 14px;
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            width: 100%;
            font-family: inherit;
            box-shadow: 0 3px 0 #e0d4f8;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .opt-btn-5pt:hover:not(:disabled) {
            border-color: #9b7fe8;
            background: #f3eeff;
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #c4a8ff;
        }

        .opt-btn-5pt:active:not(:disabled) {
            transform: translateY(1px);
            box-shadow: 0 2px 0 #c4a8ff;
        }

        .opt-btn-5pt:disabled { cursor: default; }

        .opt-btn-5pt.chosen {
            border-color: #9b7fe8;
            background: #f3eeff;
            box-shadow: 0 3px 0 #9b7fe8;
        }

        .opt-emoji {
            font-size: 20px;
            flex-shrink: 0;
            width: 28px;
            text-align: center;
        }

        .opt-content {
            flex: 1;
        }

        .opt-main-text {
            font-size: 13px;
            color: #4a3a7a;
            line-height: 1.5;
            font-weight: 700;
            display: block;
        }

        .opt-sub-text {
            font-size: 11px;
            color: #a090c0;
            font-weight: 600;
            display: block;
            margin-top: 2px;
        }

        /* Q25 综合校验题 - 特殊布局 */
        .options-q25 {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 14px;
        }

        /* 即时反馈 */
        .feedback-box {
            display: none;
            background: #fff;
            border-radius: 16px;
            padding: 14px 16px;
            margin-bottom: 14px;
            border-left: 4px solid #9b7fe8;
            box-shadow: 0 4px 16px rgba(124,92,191,0.1);
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .fb-label {
            font-size: 11px;
            color: #9b7fe8;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .fb-text {
            font-size: 13px;
            color: #6a5a9a;
            line-height: 1.7;
            font-weight: 600;
        }

        .next-btn {
            display: none;
            width: 100%;
            background: linear-gradient(135deg, #9b7fe8 0%, #7c5cbf 100%);
            color: white;
            border: none;
            padding: 16px 0;
            font-size: 16px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 1px;
            box-shadow: 0 6px 0 #5a3d9a, 0 8px 16px rgba(124,92,191,0.35);
            transition: transform 0.15s, box-shadow 0.15s;
            font-family: inherit;
        }

        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #5a3d9a, 0 10px 20px rgba(124,92,191,0.35);
        }

        .next-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #5a3d9a;
        }

        /* ══ 结果页 ══ */
        #resultPage { display: none; }

        .result-banner {
            background: linear-gradient(135deg, #9b7fe8 0%, #7c5cbf 100%);
            border-radius: 24px;
            padding: 28px 24px;
            margin-bottom: 14px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(124,92,191,0.35);
        }

        .result-type-tag {
            display: inline-block;
            background: rgba(255,255,255,0.25);
            color: #fff;
            font-size: 12px;
            font-weight: 800;
            padding: 4px 16px;
            border-radius: 20px;
            margin-bottom: 14px;
            letter-spacing: 2px;
        }

        .result-avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255,255,255,0.6);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            margin: 0 auto 14px;
            display: block;
        }

        .result-name {
            font-size: 32px;
            font-weight: 900;
            color: #fff;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.15);
            letter-spacing: 4px;
            margin-bottom: 6px;
        }

        .result-mnemonic {
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .result-quote {
            font-size: 14px;
            color: rgba(255,255,255,0.9);
            font-style: italic;
            line-height: 1.7;
            font-weight: 600;
        }

        /* 信度指数 */
        .reliability-card {
            background: #fff;
            border-radius: 16px;
            padding: 14px 18px;
            margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(124,92,191,0.12);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .reliability-icon {
            font-size: 28px;
            flex-shrink: 0;
        }

        .reliability-info { flex: 1; }

        .reliability-label {
            font-size: 11px;
            color: #9b7fe8;
            font-weight: 800;
            margin-bottom: 3px;
        }

        .reliability-bar-wrap {
            background: #ede8f8;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 3px;
        }

        .reliability-bar-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, #9b7fe8, #c4a8ff);
            transition: width 1s ease;
        }

        .reliability-text {
            font-size: 11px;
            color: #b0a0c8;
            font-weight: 600;
        }

        /* 光谱卡片 */
        .spectrum-card {
            background: #fff;
            border-radius: 20px;
            padding: 18px 18px;
            margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(124,92,191,0.12);
        }

        .section-title {
            font-size: 14px;
            font-weight: 900;
            color: #7c5cbf;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .spectrum-item { margin-bottom: 16px; }
        .spectrum-item:last-child { margin-bottom: 0; }

        .spectrum-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #9080b0;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .spectrum-labels .s-mid {
            color: #c0b0d8;
            font-size: 10px;
        }

        .spectrum-track {
            position: relative;
            background: #ede8f8;
            height: 10px;
            border-radius: 5px;
            overflow: visible;
        }

        .spectrum-fill {
            height: 100%;
            border-radius: 5px;
            background: linear-gradient(90deg, #9b7fe8, #c4a8ff);
            transition: width 1.2s ease;
        }

        .spectrum-midline {
            position: absolute;
            left: 50%;
            top: -3px;
            width: 2px;
            height: 16px;
            background: #c0b0d8;
            transform: translateX(-50%);
            border-radius: 1px;
        }

        .spectrum-tendency {
            font-size: 10px;
            color: #b0a0c8;
            margin-top: 3px;
            text-align: center;
            font-weight: 700;
        }

        /* 维度详细分析 */
        .dim-detail-card {
            background: #fff;
            border-radius: 20px;
            padding: 18px 18px;
            margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(124,92,191,0.12);
        }

        .dim-detail-item {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #f0eaff;
        }

        .dim-detail-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .dim-detail-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .dim-detail-name {
            font-size: 13px;
            font-weight: 800;
            color: #7c5cbf;
        }

        .dim-detail-pct {
            font-size: 12px;
            font-weight: 900;
            color: #9b7fe8;
            background: #f3eeff;
            padding: 2px 10px;
            border-radius: 10px;
        }

        .dim-detail-stars {
            font-size: 12px;
            margin-bottom: 4px;
        }

        .dim-detail-desc {
            font-size: 12px;
            color: #8070a8;
            line-height: 1.6;
            font-weight: 600;
        }

        /* 描述卡片 */
        .desc-card {
            background: #fff;
            border-radius: 20px;
            padding: 18px 18px;
            margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(124,92,191,0.12);
        }

        .desc-card p {
            font-size: 14px;
            color: #5a4a8a;
            line-height: 1.85;
            font-weight: 600;
        }

        /* 建议卡片 */
        .advice-card {
            background: #fff;
            border-radius: 20px;
            padding: 18px 18px;
            margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(124,92,191,0.12);
        }

        .advice-item {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            align-items: flex-start;
        }

        .advice-item:last-child { margin-bottom: 0; }

        .advice-icon {
            font-size: 18px;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .advice-text {
            font-size: 13px;
            color: #6a5a9a;
            line-height: 1.65;
            font-weight: 600;
        }

        /* CP 配对 */
        .cp-card-wrap {
            background: #fff;
            border-radius: 20px;
            padding: 18px 18px;
            margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(124,92,191,0.12);
        }

        .cp-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .cp-card {
            background: #f3eeff;
            border: 2px solid #e0d4f8;
            border-radius: 16px;
            padding: 12px 8px;
            text-align: center;
        }

        .cp-type-label {
            font-size: 10px;
            color: #9b7fe8;
            font-weight: 900;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .cp-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #c4a8ff;
            margin: 0 auto 7px;
            display: block;
        }

        .cp-code {
            font-size: 13px;
            color: #7c5cbf;
            font-weight: 900;
            margin-bottom: 2px;
            letter-spacing: 1px;
        }

        .cp-name {
            font-size: 12px;
            color: #9080b0;
            font-weight: 700;
        }

        .cp-desc {
            font-size: 10px;
            color: #b0a0c8;
            margin-top: 4px;
            line-height: 1.4;
            font-weight: 600;
        }

        /* 免责声明 */
        .disclaimer {
            background: #f9f6ff;
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 14px;
            border: 1px solid #e8e0f8;
        }

        .disclaimer p {
            font-size: 11px;
            color: #b0a0c8;
            line-height: 1.7;
            font-weight: 600;
            text-align: center;
        }

        .restart-btn {
            width: 100%;
            background: linear-gradient(135deg, #9b7fe8 0%, #7c5cbf 100%);
            color: white;
            border: none;
            padding: 16px 0;
            font-size: 16px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 1px;
            box-shadow: 0 6px 0 #5a3d9a, 0 8px 16px rgba(124,92,191,0.35);
            transition: transform 0.15s, box-shadow 0.15s;
            font-family: inherit;
            margin-bottom: 12px;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #5a3d9a, 0 10px 20px rgba(124,92,191,0.35);
        }

        .restart-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #5a3d9a;
        }

        .share-hint {
            text-align: center;
            color: #b0a0c8;
            font-size: 12px;
            font-weight: 600;
        }

        /* ══ 动画 ══ */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.4s ease; }

        /* ══ 响应式 ══ */
        @media (max-width: 380px) {
            .banner-title { font-size: 28px; }
            .cp-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- ══ 开始页 ══ -->
    <div id="startPage" class="fade-in">
        <div class="start-banner">
            <div class="banner-title">角 星 君</div>
            <div class="banner-sub">✦ 亲密关系人格测试 V2.0 ✦</div>
        </div>

        <div class="white-card">
            <div class="dim-grid">
                <div class="dim-card">
                    <div class="dim-title">深沉 · 旷达</div>
                    <div class="dim-vs">D 沉入内心深处<br>vs W 旷野自由流动</div>
                </div>
                <div class="dim-card">
                    <div class="dim-title">映照 · 陪伴</div>
                    <div class="dim-vs">M 敏感细腻映照<br>vs P 平静稳定陪伴</div>
                </div>
                <div class="dim-card">
                    <div class="dim-title">隐语 · 鸣响</div>
                    <div class="dim-vs">S 沉默藏于心底<br>vs V 鸣响说出来</div>
                </div>
                <div class="dim-card">
                    <div class="dim-title">炼化 · 融合</div>
                    <div class="dim-vs">F 直面炼化冲突<br>vs L 融合等待消散</div>
                </div>
            </div>

            <div class="badges">
                <span class="badge">✦ 共 25 题</span>
                <span class="badge">⏱ 约 5 分钟</span>
                <span class="badge">🔬 科学增强版</span>
                <span class="badge">🌙 CP 配对</span>
            </div>

            <div class="start-intro">
                欢迎来到「脑回路解码实验室」！<br>
                接下来有 25 个生活切片，请凭第一直觉选择。<br>
                这不是考试，没有对错，只是帮你画一张「灵魂使用说明书」。
            </div>

            <button class="start-btn" onclick="startTest()">✦ 开始测试 ✦</button>
        </div>
    </div>

    <!-- ══ 问题页 ══ -->
    <div id="questionPage">
        <div class="progress-wrap">

    const pct = (currentQ / questions.length) * 100;

    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('qNum').textContent = `第 ${currentQ + 1} 题 / 共 ${questions.length} 题`;
    document.getElementById('qDim').textContent = q.part;
    document.getElementById('qLabel').textContent = q.label + ' · ' + q.dim;
    document.getElementById('qTitle').textContent = q.scene ? '【场景】' + q.scene : '';
    document.getElementById('qText').textContent = q.text;

    const sceneEl = document.getElementById('qScene');
    sceneEl.textContent = '';

    // 渲染选项
    const isQ25 = (currentQ === 24);
    const wrapClass = isQ25 ? 'options-q25' : 'options-5pt';

    const html = `<div class="${wrapClass}">` + q.options.map((opt, i) => `
        <button class="opt-btn-5pt" id="opt${i}" onclick="selectOption(${i})">
            <span class="opt-emoji">${opt.emoji}</span>
            <span class="opt-content">
                <span class="opt-main-text">${opt.main}</span>
                ${opt.sub ? `<span class="opt-sub-text">${opt.sub}</span>` : ''}
            </span>
        </button>
    `).join('') + `</div>`;

    document.getElementById('optionsList').innerHTML = html;
}

// ─────────────────────────────────────────────────────────────
// 选择选项（五点量表计分）
// ─────────────────────────────────────────────────────────────
function selectOption(idx) {
    if (answered) return;
    answered = true;

    const q = questions[currentQ];
    const score = idx + 1; // 1-5 分
    rawAnswers.push({ qIdx: currentQ, score: score, reverse: q.reverse });

    // Q25 综合校验题：直接用 calibrate 微调
    if (currentQ === 24) {
        const cal = q.options[idx].calibrate || {};
        Object.keys(cal).forEach(k => {
            dimScores[k] = (dimScores[k] || 0) + cal[k];
        });
    } else {
        // 正常计分：score 1→左维度最强，score 5→右维度最强
        // 反向题：score 1→右维度最强，score 5→左维度最强
        const effectiveScore = q.reverse ? (6 - score) : score;
        const w = q.weight;

        // effectiveScore 1-2 → leftDim，4-5 → rightDim，3 → 中性
        if (effectiveScore <= 2) {
            const contribution = (3 - effectiveScore) * w; // 2→1, 1→2
            dimScores[q.leftDim] = (dimScores[q.leftDim] || 0) + contribution;
        } else if (effectiveScore >= 4) {
            const contribution = (effectiveScore - 2) * w; // 4→2, 5→3... wait
            // effectiveScore 4 → contribution 2*w, 5 → 3*w? Let's normalize:
            // effectiveScore 4 → 1*w, effectiveScore 5 → 2*w
            const c = (effectiveScore - 3) * w;
            dimScores[q.rightDim] = (dimScores[q.rightDim] || 0) + c;
        }
        // effectiveScore 3 → 中性，不加分
    }

    document.querySelectorAll('.opt-btn-5pt').forEach((btn, i) => {
        btn.disabled = true;
        if (i === idx) btn.classList.add('chosen');
    });

    document.getElementById('feedbackText').textContent = q.feedback;
    document.getElementById('feedbackBox').style.display = 'block';

    const nb = document.getElementById('nextBtn');
    nb.style.display = 'block';
    nb.textContent = currentQ < questions.length - 1 ? '继续 →' : '查看我的星图 ✦';
}

// ─────────────────────────────────────────────────────────────
// 下一题
// ─────────────────────────────────────────────────────────────
function nextQuestion() {
    currentQ++;
    if (currentQ < questions.length) {
        const qp = document.getElementById('questionPage');
        qp.classList.remove('fade-in');
        setTimeout(() => { qp.classList.add('fade-in'); renderQuestion(); }, 50);
    } else {
        showResult();
    }
}

// ─────────────────────────────────────────────────────────────
// 信度检验
// ─────────────────────────────────────────────────────────────
function checkReliability() {
    // 检查正向题与反向题的一致性
    // D/W: Q1(正,D→低分), Q4(反,D→低分实际是高分)
    // 如果Q1选1-2（强D）且Q4选1-2（反向后也是强D），一致
    // 如果Q1选1-2（强D）且Q4选4-5（反向后是强W），不一致
    const pairs = [
        { fwd: 0, rev: 3 },   // Q1 vs Q4 (D/W)
        { fwd: 1, rev: 4 },   // Q2 vs Q5 (D/W)
        { fwd: 6, rev: 9 },   // Q7 vs Q10 (M/P)
        { fwd: 7, rev: 10 },  // Q8 vs Q11 (M/P)
        { fwd: 12, rev: 15 }, // Q13 vs Q16 (S/V)
        { fwd: 13, rev: 16 }, // Q14 vs Q17 (S/V)
        { fwd: 18, rev: 21 }, // Q19 vs Q22 (F/L)
        { fwd: 19, rev: 22 }  // Q20 vs Q23 (F/L)
    ];

    let inconsistencies = 0;
    pairs.forEach(pair => {
        const fwdAns = rawAnswers.find(a => a.qIdx === pair.fwd);
        const revAns = rawAnswers.find(a => a.qIdx === pair.rev);
        if (fwdAns && revAns) {
            const fwdScore = fwdAns.score;
            const revEffective = 6 - revAns.score; // 反向题转换
            // 如果两者差距超过3，认为不一致
            if (Math.abs(fwdScore - revEffective) > 3) {
                inconsistencies++;
            }
        }
    });

    const reliability = Math.max(0, 1 - (inconsistencies / 8));
    return Math.round(reliability * 100);
}

// ─────────────────────────────────────────────────────────────
// 生成结果
// ─────────────────────────────────────────────────────────────
function showResult() {
    // 计算各维度百分比（左维度分数占比）
    function pairPct(leftKey, rightKey) {
        const l = dimScores[leftKey] || 0;
        const r = dimScores[rightKey] || 0;
        const total = l + r;
        if (total === 0) return 50;
        return Math.round((l / total) * 100);
    }

    const dwPct = pairPct('D', 'W');
    const mpPct = pairPct('M', 'P');
    const svPct = pairPct('S', 'V');
    const flPct = pairPct('F', 'L');

    const D = dwPct >= 50 ? 'D' : 'W';
    const M = mpPct >= 50 ? 'M' : 'P';
    const S = svPct >= 50 ? 'S' : 'V';
    const F = flPct >= 50 ? 'F' : 'L';
    const code = D + M + S + F;

    const p = personalities[code] || personalities['DMSF'];
    const cp = cpTable[code] || cpTable['DMSF'];
    const reliabilityPct = checkReliability();

    // 强度描述
    function intensityLabel(pct) {
        const diff = Math.abs(50 - pct);
        if (diff > 30) return '强烈';
        if (diff > 15) return '明显';
        return '中等';
    }

    // 星级
    function stars(pct, leftKey) {
        const diff = Math.abs(50 - pct);
        const filled = Math.min(5, Math.round(diff / 10) + 1);
        return '⭐'.repeat(filled) + '☆'.repeat(5 - filled);
    }

    const spectrumBars = dimInfo.map((d, i) => {
        const pcts = [dwPct, mpPct, svPct, flPct];
        const pct = pcts[i];
        let tendency = '平衡';
        if (pct > 60)      tendency = `偏 ${d.leftLabel}`;
        else if (pct < 40) tendency = `偏 ${d.rightLabel}`;
        return `
        <div class="spectrum-item">
            <div class="spectrum-labels">
                <span>${d.leftLabel}</span>
                <span class="s-mid">${d.name}</span>
                <span>${d.rightLabel}</span>
            </div>
            <div class="spectrum-track">
                <div class="spectrum-fill" style="width:${pct}%"></div>
                <div class="spectrum-midline"></div>
            </div>
            <div class="spectrum-tendency">${tendency}</div>
        </div>`;
    }).join('');

    const dimDetails = dimInfo.map((d, i) => {
        const pcts = [dwPct, mpPct, svPct, flPct];
        const pct = pcts[i];
        const isLeft = pct >= 50;
        const activeDim = isLeft ? d.leftLabel : d.rightLabel;
        const activeDetail = isLeft ? d.leftDetail : d.rightDetail;
        const intensity = intensityLabel(pct);
        const displayPct = isLeft ? pct : (100 - pct);
        return `
        <div class="dim-detail-item">
            <div class="dim-detail-header">
                <span class="dim-detail-name">${d.name}</span>
                <span class="dim-detail-pct">${activeDim} · ${displayPct}%</span>
            </div>
            <div class="dim-detail-stars">${stars(pct)} ${intensity}倾向</div>
            <div class="dim-detail-desc">${activeDetail}</div>
        </div>`;
    }).join('');

    const adviceItems = (p.advice || []).map(a => `
        <div class="advice-item">
            <span class="advice-icon">${a.icon}</span>
            <span class="advice-text">${a.text}</span>
        </div>
    `).join('');

    const cpCards = ['soul', 'night', 'mirror'].map(type => {
        const cpCode = cp[type];
        const cpP = personalities[cpCode] || { name: '—', mnemonic: '' };
        const info = cpTypeLabel[type];
        return `
        <div class="cp-card">
            <div class="cp-type-label">${info.label}</div>
            <img class="cp-avatar" src="images/${cpCode} ${cpP.name}.png" alt="${cpP.name}" onerror="this.style.display='none'">
            <div class="cp-code">${cpCode}</div>
            <div class="cp-name">${cpP.name}</div>
            <div class="cp-desc">${info.desc}</div>
        </div>`;
    }).join('');

    document.getElementById('questionPage').style.display = 'none';
    const rp = document.getElementById('resultPage');
    rp.style.display = 'block';
    rp.classList.add('fade-in');

    rp.innerHTML = `
        <div class="result-banner">
            <div class="result-type-tag">✦ ${code} ✦</div>
            <img class="result-avatar" src="images/${code} ${p.name}.png" alt="${p.name}" onerror="this.style.display='none'">
            <div class="result-name">${p.name}</div>
            <div class="result-mnemonic">${p.mnemonic}</div>
            <p class="result-quote">"${p.quote}"</p>
        </div>

        <div class="reliability-card">
            <span class="reliability-icon">🧪</span>
            <div class="reliability-info">
                <div class="reliability-label">答题一致性指数</div>
                <div class="reliability-bar-wrap">
                    <div class="reliability-bar-fill" style="width:${reliabilityPct}%"></div>
                </div>
                <div class="reliability-text">${reliabilityPct}% · ${reliabilityPct >= 80 ? '结果可信度高 ✓' : reliabilityPct >= 60 ? '结果基本可信' : '建议重新测试'}</div>
            </div>
        </div>

        <div class="spectrum-card">
            <div class="section-title">📊 你的关系光谱</div>
            ${spectrumBars}
        </div>

        <div class="dim-detail-card">
            <div class="section-title">🔍 维度详细分析</div>
            ${dimDetails}
        </div>

        <div class="desc-card">
            <div class="section-title">🌙 你在关系里的样子</div>
            <p>${p.desc}</p>
        </div>

        <div class="advice-card">
            <div class="section-title">💡 个性化建议</div>
            ${adviceItems}
        </div>

        <div class="cp-card-wrap">
            <div class="section-title">✦ 你的 CP 配对</div>
            <div class="cp-grid">${cpCards}</div>
        </div>

        <div class="disclaimer">
            <p>⚠️ 本测试基于心理学类型理论，结果仅供参考。<br>人的复杂性远超任何测试，请勿用结果定义自己或他人。</p>
        </div>

        <button class="restart-btn" onclick="restartTest()">✦ 重新测试 ✦</button>
        <p class="share-hint">截图分享给朋友，看看你们是什么配对～</p>
    `;
}

// ─────────────────────────────────────────────────────────────
// 重新测试
// ─────────────────────────────────────────────────────────────
function restartTest() {
    currentQ = 0;
    dimScores = { D: 0, W: 0, M: 0, P: 0, S: 0, V: 0, F: 0, L: 0 };
    rawAnswers = [];
    answered = false;

    document.getElementById('resultPage').style.display = 'none';
    const sp = document.getElementById('startPage');
    sp.style.display = 'block';
    sp.classList.add('fade-in');
}
</script>
