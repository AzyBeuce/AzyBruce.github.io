        }

            height: 8px;
            background: white;
            border-radius: 50%;
        }

            font-weight: bold;
            color: #667eea;
            width: 20px;
            flex-shrink: 0;
        }

        .likert-label {

            color: #555;

            .question-text { font-size: 17px; }

        }
    </style>
</head>

// ─────────────────────────────────────────────
// 状态变量
// ─────────────────────────────────────────────
let currentQuestion = 0;
let selectedScore = null;
// 每个维度累计原始得分（满分 25，中线 15）
let scores = { ZR: 0, SW: 0, MC: 0, BN: 0 };

// ─────────────────────────────────────────────
// 开始测试
// ─────────────────────────────────────────────
function startTest() {
    document.getElementById('startPage').style.display = 'none';
    const qp = document.getElementById('questionPage');
    qp.style.display = 'block';
    qp.classList.add('fade-in');
    renderQuestion();
}

// ─────────────────────────────────────────────
// 渲染当前题目
// ─────────────────────────────────────────────
function renderQuestion() {
    selectedScore = null;
    document.getElementById('nextBtn').style.display = 'none';

    const q = questions[currentQuestion];
    const progress = (currentQuestion / questions.length) * 100;

    document.getElementById('progressFill').style.width = progress + '%';
    document.getElementById('questionNumber').textContent = `第 ${currentQuestion + 1} 题 / 共 ${questions.length} 题`;
    document.getElementById('dimensionTag').textContent = dimensionNames[q.dimension];
    document.getElementById('questionText').textContent = q.text;

    const scaleHtml = likertLabels.map(item => `
        <div class="likert-option" onclick="selectScore(${item.score}, this)">
            <div class="likert-dot"></div>
            <span class="likert-score">${item.score}</span>
            <span class="likert-label">${item.label}</span>
        </div>
    `).join('');

    document.getElementById('likertScale').innerHTML = scaleHtml;
}

// ─────────────────────────────────────────────
// 选择分值
// ─────────────────────────────────────────────
function selectScore(score, el) {
    // 清除已选
    document.querySelectorAll('.likert-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    selectedScore = score;
    document.getElementById('nextBtn').style.display = 'block';
}

// ─────────────────────────────────────────────
// 下一题
// ─────────────────────────────────────────────
function nextQuestion() {
    if (selectedScore === null) return;

    const q = questions[currentQuestion];
    // 反向计分
    const finalScore = q.reverse ? (6 - selectedScore) : selectedScore;
    scores[q.dimension] += finalScore;

    currentQuestion++;

    if (currentQuestion < questions.length) {
        const qp = document.getElementById('questionPage');
        qp.classList.remove('fade-in');
        setTimeout(() => {
            qp.classList.add('fade-in');
            renderQuestion();
        }, 50);
    } else {
        showResult();
    }
}

// ─────────────────────────────────────────────
// 计算并显示结果
// ─────────────────────────────────────────────
function showResult() {
    // 每个维度满分 25，中线 15
    const Z = scores.ZR >= 15 ? 'Z' : 'R';
    const S = scores.SW >= 15 ? 'S' : 'W';
    const M = scores.MC >= 15 ? 'M' : 'C';
    const B = scores.BN >= 15 ? 'B' : 'N';
    const code = Z + S + M + B;

    const result = results[code] || results['ZSMB'];

    document.getElementById('questionPage').style.display = 'none';
    const rp = document.getElementById('resultPage');
    rp.style.display = 'block';
    rp.classList.add('fade-in');

    // 生成维度得分条 HTML
    const dimBars = [
        { label: '真性', left: 'Z 真诚直率', right: 'R 融通委婉', score: scores.ZR },
        { label: '善性', left: 'S 善他利他', right: 'W 卫己自护', score: scores.SW },
        { label: '美性', left: 'M 美序和谐', right: 'C 纯然自然', score: scores.MC },
        { label: '我性', left: 'B 表达外显', right: 'N 内敛沉淀', score: scores.BN },
    ].map(d => {
        const pct = ((d.score - 5) / 20 * 100).toFixed(1); // 5~25 → 0%~100%
        return `
        <div class="score-bar-item">
            <div class="score-bar-header">
                <span>${d.left}</span>
                <span style="color:#999">${d.label} ${d.score}/25</span>
                <span>${d.right}</span>
            </div>
            <div class="score-bar-track">
                <div class="score-bar-fill" style="width:${pct}%"></div>
                <div class="score-bar-midline"></div>
            </div>
        </div>`;
    }).join('');

    rp.innerHTML = `
        <div class="result-header">
            <div class="result-code">你的类型代码：${code}</div>
            <h1 class="result-title">「${result.name}」</h1>
            <p class="result-quote">"${result.quote}"</p>
        </div>

        <div class="score-bars">
            <h4>📊 你的四维得分</h4>
            ${dimBars}
        </div>

        <div class="result-section">
            <h3>📖 人物速写</h3>
            <p>${result.description}</p>
        </div>

        <div class="result-section">
            <h3>💫 核心信念</h3>
            <p>"${result.belief}"</p>
        </div>

        <div class="result-section">
            <h3>✨ 你的光芒</h3>
            <div class="trait-tags">
                ${result.traits.map(t => `<span class="trait-tag">${t}</span>`).join('')}
            </div>
        </div>

        <div class="result-section">
            <h3>📚 你的功课</h3>
            <p>${result.lesson}</p>
        </div>

        <div class="result-section">
            <h3>🎬 代表场景</h3>
            <div class="scene-box">
                <p>${result.scene}</p>
            </div>
        </div>

        <div class="result-section">
            <div class="advice-box">
                <h3>💝 专属小建议</h3>
                <p>${result.advice}</p>
            </div>
        </div>

        <div class="share-section">
            <button class="restart-btn" onclick="restartTest()">🔄 重新测试</button>
            <p class="share-hint">截图分享给朋友，看看ta是什么类型～</p>
        </div>
    `;
}

// ─────────────────────────────────────────────
// 重新测试
// ─────────────────────────────────────────────
function restartTest() {
    currentQuestion = 0;
    selectedScore = null;
    scores = { ZR: 0, SW: 0, MC: 0, BN: 0 };
    document.getElementById('resultPage').style.display = 'none';
    const sp = document.getElementById('startPage');
    sp.style.display = 'block';
    sp.classList.add('fade-in');
}
</script>
