                advice: "提前说，而不是最后说——你的智慧值得更早被听到。"
            },
            "ZiMI": {
                name: "阳光织网者",
                quote: "我把好意编成故事讲给你听",
                description: "坦诚、追求秩序美、主动表达，但说话方式温和委婉。像阳光透过纱窗——依然明亮，但不刺眼。",
                belief: "真实可以很温柔。",
                traits: ["有原则有技巧", "讲究但不苛刻", "让人听得舒服", "不靠吵架说服人"],
                lesson: "有时候你包装得太好，力道就弱了。重要的事，可以适当「直给」——别人能承受的比你以为的多。",
                scene: "给实习生反馈，ta的方案需要大改。你说：「整体思路很好，我有几个点想和你聊聊......」改完后ta特别感谢你。",
                advice: "偶尔做一次「严厉的好人」——你会发现别人反而更尊重你。"
            },
            "ZiMi": {
                name: "月下思考者",
                quote: "我想清楚了才行动，但行动一定算数",
                description: "坦诚、委婉、追求秩序、内敛——组合起来是一种「安静的可靠」。像月光下的一盏灯，不耀眼，但你知道它一直亮着。",
                belief: "谋定而后动。",
                traits: ["人形保险箱", "说话算话", "天生的幕后军师", "表面平静内心清晰"],
                lesson: "你的思考很成熟，但想太久会错过时机。有时候「差不多」就可以开始了——边做边调整也是一种智慧。",
                scene: "朋友创业邀请你入伙。你没立刻答应，回去做了详细调研，一周后拿出一份报告，包括风险分析和「我可以帮你做这些」。",
                advice: "试试「先说好，再想怎么做」——惊喜有时候比完美更珍贵。"
            },
            "zsMI": {
                name: "星河漫步者",
                quote: "我用自己的节奏丈量世界",
                description: "委婉、守护自我、接纳混沌、愿意表达——这是一种很少见的「松弛感」。像一个在星河中漫步的人，自在、随性、不急不躁。",
                belief: "人生不是冲刺，是一场漫游。",
                traits: ["情绪稳定", "有自己的节奏", "愿意分享不求理解", "相处像度假"],
                lesson: "你的松弛是真正的松弛，但有时候别人需要你「紧」一下——比如ta真的很需要你的明确态度时。",
                scene: "大家都在焦虑deadline。你也在做，但没有焦虑。有人问：「你不急吗？」你说：「急也还是要做，不如不急地做。」",
                advice: "分一点你的松弛感给别人——教会他们也慢下来。"
            },
            "zsMi": {
                name: "彩虹信使",
                quote: "世界已经够灰了，我来加点颜色",
                description: "委婉善良、守护自己、追求美感、主动表达——组合起来是一种「温柔的创造力」。像一道彩虹，自己美着，也让别人心情变好。",
                belief: "美是治愈世界的药。",
                traits: ["审美在线", "愿意分享美好", "表达有温度", "保护自己也温暖他人"],
                lesson: "彩虹需要阳光和雨水——偶尔允许自己「下雨」，不用一直美美的。",
                scene: "朋友心情不好。你没有讲大道理，而是发了一张今天拍的晚霞照片：「送给你。今天的天空很像你——经过了很多事，但还是很美。」",
                advice: "也给自己发一张照片——你值得欣赏自己。"
            },
            "zsmi": {
                name: "深林种花者",
                quote: "我在自己的世界里，种给自己的花",
                description: "委婉、自我守护、追求秩序、内敛——四个维度都偏「内向」。像深林里一个人在种花的人，不求被发现，只求花开得好。",
                belief: "我的花为自己而开。",
                traits: ["极其丰富的精神世界", "高度的自我完整性", "不依赖外界认可", "真正的独处高手"],
                lesson: "你的林子很美，但一个人待太久会错过外面的阳光。偶尔出来走走，让别人也看看你的花。",
                scene: "你有一项坚持了很久的爱好。没发过朋友圈，没告诉过任何人。作品堆满了文件夹。你享受创作本身，发不发表无所谓。",
                advice: "邀请一个人进入你的森林——哪怕只是让ta看一眼你的花。"
            },
            "zsmi": {
                name: "云端守望者",
                quote: "我在自己的世界里，安静地爱着这个世界",
                description: "委婉、守护自我、接纳混乱、内敛——四个维度都很「柔」很「轻」。像云端上一个安静守望的人，看着人间，不打扰，但在祝福。",
                belief: "存在本身就是意义。",
                traits: ["接纳一切不评判", "独立完整", "让人安心的存在感", "真正的顺其自然"],
                lesson: "你太超脱了——有时候人间需要你「下凡」一下，参与进来，哪怕弄脏一点点手。",
                scene: "朋友吵架找你评理。你听完没站任何一边：「你们都有道理。可能过两天就好了。如果没好，再来找我。」两天后果然好了。",
                advice: "偶尔「多管闲事」一下——这个世界需要你的参与。"
            }
        };

        // 状态变量
        let currentQuestion = 0;
        let answers = { Z: 0, S: 0, M: 0, I: 0 };

        // 开始测试
        function startTest() {
            document.getElementById('startPage').style.display = 'none';
            document.getElementById('questionPage').style.display = 'block';
            document.getElementById('questionPage').classList.add('fade-in');
            showQuestion();
        }

        // 显示问题
        function showQuestion() {
            const question = questions[currentQuestion];
            const progress = ((currentQuestion) / questions.length) * 100;
            
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('questionNumber').textContent = `问题 ${currentQuestion + 1} / ${questions.length}`;
            document.getElementById('questionText').textContent = question.text;
            
            const optionsHtml = question.options.map((opt, index) => `
                <div class="option" onclick="selectOption('${question.dimension}', '${opt.value}')">
                    <div class="option-label">${opt.label}</div>
                    <div class="option-text">${opt.text}</div>
                </div>
            `).join('');
            
            document.getElementById('options').innerHTML = optionsHtml;
        }

        // 选择选项
        function selectOption(dimension, value) {
            if (value === '+') {
                answers[dimension]++;
            }
            
            currentQuestion++;
            
            if (currentQuestion < questions.length) {
                document.getElementById('questionPage').classList.remove('fade-in');
                setTimeout(() => {
                    document.getElementById('questionPage').classList.add('fade-in');
                    showQuestion();
                }, 50);
            } else {
                showResult();
            }
        }

        // 计算并显示结果
        function showResult() {
            // 计算类型代码
            const code = 
                (answers.Z >= 1 ? 'Z' : 'z') +
                (answers.S >= 1 ? 'S' : 's') +
                (answers.M >= 1 ? 'M' : 'm') +
                (answers.I >= 1 ? 'I' : 'i');
            
            // 获取结果数据（如果没有匹配的，使用默认）
            let result = results[code];
            if (!result) {
                // 尝试一些备用匹配
                const fallbackCodes = ['ZSMI', 'ZSMi', 'ZSmI', 'ZSmi', 'zSMI', 'zSMi', 'zSmI', 'zSmi'];
                for (let fc of fallbackCodes) {
                    if (results[fc]) {
                        result = results[fc];
                        break;
                    }
                }
            }
            
            document.getElementById('questionPage').style.display = 'none';
            document.getElementById('resultPage').style.display = 'block';
            document.getElementById('resultPage').classList.add('fade-in');
            
            document.getElementById('resultPage').innerHTML = `
                <div class="result-header">
                    <div class="result-code">你的类型代码：${code}</div>
                    <h1 class="result-title">「${result.name}」</h1>
                    <p class="result-quote">"${result.quote}"</p>
                </div>
                
                <div class="result-section">
                    <h3>📖 人物速写</h3>
                    <p>${result.description}</p>
                </div>
                
                <div class="result-section">
                    <h3>💫 核心信念</h3>
                    <p>"${result.belief}"</p>
                </div>
                
                <div class="result-section">
                    <h3>✨ 你的光芒</h3>
                    <div class="trait-tags">
                        ${result.traits.map(t => `<span class="trait-tag">${t}</span>`).join('')}
                    </div>
                </div>
                
                <div class="result-section">
                    <h3>📚 你的功课</h3>
                    <p>${result.lesson}</p>
                </div>
                
                <div class="result-section">
                    <h3>🎬 代表场景</h3>
                    <div class="scene-box">
                        <p>${result.scene}</p>
                    </div>
                </div>
                
                <div class="result-section">
                    <div class="advice-box">
                        <h3 style="color: #e75480; margin-bottom: 10px;">💝 专属小建议</h3>
                        <p>${result.advice}</p>
                    </div>
                </div>
                
                <div class="share-section">
                    <button class="restart-btn" onclick="restartTest()">🔄 重新测试</button>
                    <p class="share-hint">截图分享给朋友，看看ta是什么类型～</p>
                </div>
            `;
        }

        // 重新测试
        function restartTest() {
            currentQuestion = 0;
            answers = { Z: 0, S: 0, M: 0, I: 0 };
            document.getElementById('resultPage').style.display = 'none';
            document.getElementById('startPage').style.display = 'block';
            document.getElementById('startPage').classList.add('fade-in');
        }
    </script>
</body>
